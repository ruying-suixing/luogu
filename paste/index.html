    <script>
        (function() {
            // ==================== 新渲染引擎 (完全移植自第一个文件) ====================
            if (typeof hljs === 'undefined') {
                console.warn('hljs 未加载，使用降级');
                window.hljs = { highlight: (code) => ({ value: code }), highlightElement: (el) => {} };
            }

            // ----- 1. 定义 marked 扩展（与第一个文件完全一致）-----
            const customExtensions = [
                {
                    name: 'alignBlock',
                    level: 'block',
                    start(src) { return src.match(/^:::\s*align\s*\{([^}]+)\}/)?.index; },
                    tokenizer(src, tokens) {
                        const match = src.match(/^:::\s*align\s*\{([^}]+)\}([\s\S]*?)\n:::/);
                        if (match) {
                            return {
                                type: 'alignBlock',
                                raw: match[0],
                                align: match[1].trim(),
                                content: match[2].trim()
                            };
                        }
                    },
                    renderer(token) {
                        return `<div class="align-${token.align}">${marked.parse(token.content)}</div>`;
                    }
                },
                {
                    name: 'epigraph',
                    level: 'block',
                    start(src) { return src.match(/^:::\s*epigraph(\[([^\]]+)\])?/)?.index; },
                    tokenizer(src, tokens) {
                        const match = src.match(/^:::\s*epigraph(\[([^\]]+)\])?\s*([\s\S]*?)\s*:::/);
                        if (match) {
                            return {
                                type: 'epigraph',
                                raw: match[0],
                                author: match[2] || '',
                                content: match[3].trim()
                            };
                        }
                    },
                    renderer(token) {
                        const authorPart = token.author ? `<p>${token.author}</p>` : '<p>unknown author</p>';
                        return `<div class="epigraph">${marked.parse(token.content)}${authorPart}</div>`;
                    }
                },
                {
                    name: 'foldable',
                    level: 'block',
                    start(src) { return src.match(/^:{3,}/)?.index; },
                    tokenizer(src, tokens) {
                        const match = src.match(/^(:{3,})\s*(\w+)?(\[([^\]]+)\])?(\s*\{([^}]+)\})?\s*([\s\S]*?)\s*\1/);
                        if (match && ['info','warning','success','error','bug','flask'].includes(match[2])) {
                            return {
                                type: 'foldable',
                                raw: match[0],
                                foldType: match[2] || 'info',
                                title: match[4] || '',
                                options: match[6] || '',
                                content: match[7].trim()
                            };
                        }
                    },
                    renderer(token) {
                        const isOpen = token.options.includes('open');
                        return `
                            <details class="foldable ${token.foldType}" ${isOpen ? 'open' : ''}>
                                <summary>${token.title || '点击展开'}</summary>
                                ${marked.parse(token.content)}
                            </details>
                        `;
                    }
                }
            ];

            marked.use({ extensions: customExtensions });

            // ----- 2. 自定义 renderer 实现代码高亮 -----
            const renderer = new marked.Renderer();
            renderer.code = function (code, language) {
                code=code.text;
                const lang = language || 'cpp';
                let highlighted = code;
                console.log(lang);
                if (lang) {
                    try {
                        highlighted = hljs.highlight(code, { language: lang, ignoreIllegals: true }).value;
                    } catch (e) {}
                }
                return `<div class="code-container"><pre><code class="language-${lang}">${highlighted}</code></pre></div>`;
            };

            marked.setOptions({
                breaks: false,
                gfm: true,
                mangle: false,
                headerIds: false,
                renderer: renderer
            });

            // ----- 3. 核心渲染函数 (含预处理、清洗、公式) -----
            function renderMarkdown(text) {
                // 预处理：公式换行 & 表格修复
                text = text.replace(/(^|\s)\$\$\s*\n([\s\S]*?)\n\s*\$\$(?=\s|$)/gm, '$1\n$$$$$2$$$$\n');
                text = text.replace(/([^\n])\n(\|.*\|)\n(\|.*[-:].*\|)/g, '$1\n\n$2\n$3');

                const rawHtml = marked.parse(text);
                const cleanHtml = DOMPurify.sanitize(rawHtml, {
                    ADD_TAGS: ['span', 'div', 'math', 'details', 'summary', 'i', 'font'],
                    ADD_ATTR: ['class', 'src', 'alt', 'data-math', 'open', 'referrerpolicy', 'crossorigin'],
                    ALLOWED_URI_REGEXP: /^(?:(?:(?:f|ht)tps?|mailto|tel|callto|cid|xmpp|xxx):|[^a-z]|[a-z+.\-]+(?:[^a-z+.\-:]|$))/i,
                    SAFE_FOR_TEMPLATES: false
                });
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = cleanHtml;

                renderMathInElement(tempDiv, {
                    delimiters: [
                        { left: '$$', right: '$$', display: true },
                        { left: '$', right: '$', display: false },
                        { left: '\\(', right: '\\)', display: false },
                        { left: '\\[', right: '\\]', display: true }
                    ],
                    strict: false,
                    escape: false,
                    preProcess: (math) => math.replace(/\\(\r?\n)/g, '\\\\$1')
                });

                tempDiv.querySelectorAll('img').forEach(img => {
                    img.setAttribute('referrerpolicy', 'no-referrer');
                    img.setAttribute('crossorigin', 'anonymous');
                });

                return tempDiv.innerHTML;
            }

            // ========== 原有业务逻辑：获取云剪切板ID、加载数据、绑定按钮 ==========
            let articleId = null;
            const path = window.location.pathname;
            const pathMatch = path.match(/\/paste\/([a-z0-9]+)/);
            if (pathMatch) articleId = pathMatch[1];
            if (!articleId && window.location.hash) articleId = window.location.hash.replace(/^#/, '').trim();
            if (!articleId) {
                const params = new URLSearchParams(window.location.search);
                articleId = params.get('id');
            }
            if (!articleId || articleId.length < 3) {
                articleId = 'yx7hyde9'; // 默认演示ID
            }

            document.getElementById('breadcrumb-current').innerText = `ID: ${articleId}`;

            const titleEl = document.getElementById('dynamic-article-title');
            const authorAvatar = document.getElementById('author-avatar');
            const authorLink = document.getElementById('author-link');
            const saveTimeEl = document.getElementById('save-time');
            const originalBtn = document.getElementById('original-btn');
            const copyBtn = document.getElementById('copy-btn');
            const updateBtn = document.getElementById('update-btn');
            const markdownBody = document.getElementById('markdown-content');
            const tocList = document.getElementById('toc-list');
            const breadcrumbSpan = document.getElementById('breadcrumb-current');

            async function loadArticle(forceUpdate = false) {
                let apiUrl = `https://luogu.qzz.io/api/p/${articleId}`;
                if (forceUpdate) {
                    apiUrl += '?update=1';
                }

                try {
                    const resp = await fetch(apiUrl, { mode: 'cors' });
                    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                    const data = await resp.json();

                    if (!data.success || data.type !== 'paste') {
                        throw new Error(data.message || '无效的云剪切板数据');
                    }
                    data.title=data.author.name+" 的云剪切板";
                    titleEl.innerText = data.title;
                    document.title = `${data.title} - GenGen 洛谷国际`;
                    breadcrumbSpan.innerText = data.title;

                    authorAvatar.src = `https://cdn.luogu.com.cn/upload/usericon/${data.author.uid}.png`;
                    authorLink.href = `https://luogu.com.cn/user/${data.author.uid}`;
                    authorLink.innerText = data.author.name;

                    const ts = data.updated_at > 1e12 ? data.updated_at : data.updated_at * 1000;
                    const d = new Date(ts);
                    const formatted = d.toLocaleString('zh-CN', { 
                        year: 'numeric', month: '2-digit', day: '2-digit',
                        hour: '2-digit', minute: '2-digit', second: '2-digit',
                        hour12: false 
                    }).replace(/\//g, '-').replace(',', '');
                    saveTimeEl.querySelector('.value').innerText = formatted;

                    originalBtn.disabled = false;
                    copyBtn.disabled = false;

                    originalBtn.onclick = () => {
                        if (data.original_url) window.open(data.original_url.trim(), '_blank');
                    };

                    copyBtn.onclick = async () => {
                        try {
                            await navigator.clipboard.writeText(data.content);
                            const old = copyBtn.innerText;
                            copyBtn.innerText = '已复制';
                            copyBtn.disabled = true;
                            setTimeout(() => {
                                copyBtn.innerText = old;
                                copyBtn.disabled = false;
                            }, 1500);
                        } catch {
                            alert('复制失败，请手动复制');
                        }
                    };

                    // 使用新渲染引擎渲染内容
                    const finalHtml = renderMarkdown(data.content);
                    markdownBody.innerHTML = finalHtml;

                    // 生成目录
                    const headers = markdownBody.querySelectorAll('h1, h2, h3');
                    if (headers.length > 0) {
                        tocList.innerHTML = '';
                        headers.forEach((h, index) => {
                            const level = parseInt(h.tagName[1]);
                            let text = h.innerText;
                            if (!h.id) {
                                h.id = `toc-header-${index}`;
                            }
                            const li = document.createElement('li');
                            const a = document.createElement('a');
                            a.href = `#${h.id}`;
                            a.innerText = text;
                            a.classList.add(`toc-h${level}`);
                            li.appendChild(a);
                            tocList.appendChild(li);
                        });

                        document.querySelectorAll('.toc-list a').forEach(a => {
                            a.addEventListener('click', e => {
                                e.preventDefault();
                                const target = document.querySelector(a.getAttribute('href'));
                                if (target) {
                                    target.scrollIntoView({ behavior: 'smooth' });
                                }
                            });
                        });
                    } else {
                        tocList.innerHTML = '<li style="color: var(--text-muted);">无标题</li>';
                    }

                } catch (err) {
                    console.error('加载失败:', err);
                    titleEl.innerText = '加载失败';
                    markdownBody.innerHTML = `<div class="error-message">错误：${err.message}</div>`;
                    breadcrumbSpan.innerText = '错误';
                }
            }

            loadArticle(false);

            updateBtn.onclick = () => {
                markdownBody.innerHTML = '<div class="loading"><div class="spinner"></div><p>更新中...</p></div>';
                loadArticle(true);
            };
        })();
    </script>
